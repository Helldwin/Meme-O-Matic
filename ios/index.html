<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mise à jour logicielle | iOS</title>
</head>
<body class="bg-black font-sans antialiased h-screen flex flex-col items-center justify-center p-6 text-center text-white">

    <div id="apple-screen" class="space-y-12">
        <div class="text-[120px] leading-none mb-10 text-white animate-pulse"></div>
        
        <div class="w-full bg-gray-600 rounded-full h-1 overflow-hidden relative shadow-inner">
            <div id="progress-bar" class="bg-white h-full rounded-full transition-all duration-300" style="width: 1%"></div>
        </div>
    </div>

    <div id="final-screen" class="hidden animate-fade-in space-y-8">
        <div class="text-[120px] leading-none mb-10 text-white"></div>
        
        <div class="bg-zinc-900 p-8 rounded-3xl shadow-2xl border border-zinc-700 text-center relative overflow-hidden">
            <p class="text-xs text-gray-500 uppercase font-bold tracking-widest mb-1">Confirmation de suppression</p>
            <h1 id="status-text" class="text-3xl font-extrabold tracking-tighter text-white mb-6">Supression du dossier Photos terminée</h1>
            
            <div id="profil-container" class="space-y-4">
                <img id="profil-avatar" src="" class="w-24 h-24 rounded-full border border-gray-200 mx-auto">
                <div>
                    <h3 id="profil-name" class="font-bold text-lg text-white">Thomas l'Accro iPhone</h3>
                    <p id="profil-info" class="text-xs text-gray-400">Modèle détecté : iPhone 14 Pro (Relou Edition)</p>
                </div>
            </div>
            
            <div class="w-full bg-zinc-800 border-2 border-red-700 text-red-600 p-6 rounded-lg text-center mt-6">
                <p class="text-sm font-bold uppercase tracking-widest">Alerte : Le dossier photos a été formaté.</p>
                <div class="text-7xl font-black text-red-700 my-4 tracking-tighter animate-pulse transition-all duration-300">0 Photos</div>
                <p class="text-xs text-gray-500 italic">C'est la transe de votre vie, Mathis.</p>
            </div>

        </div>

        <p class="text-center text-gray-600 text-[10px] mt-10 uppercase tracking-widest">Mise à jour de votre indice de dégen : Échec critique.</p>
    </div>

    <script>

        const victime = { 
            n: "Mathis l'Accro Apple", 
            avatar: "random_boy1.jpg", 
            info: "iPhone 17 Pro Max (Degen Edition)",
            dossier: "NSFW_DEGEN_PHOTOS"
        };

        // --- Tirage aléatoire ---
        document.getElementById('profil-name').innerText = victime.n;
        document.getElementById('profil-info').innerText = `Modèle détecté : ${victime.info}`;
        document.getElementById('profil-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(victime.n)}&background=random&color=fff&size=128`;
        document.getElementById('status-text').innerText = `Supression du dossier '${victime.dossier}' terminée`;

        let pct = 1;
        const bar = document.getElementById('progress-bar');
        const appleScreen = document.getElementById('apple-screen');
        const finalScreen = document.getElementById('final-screen');

        function update() {
            if (pct < 99) {
                pct += Math.random() * (pct > 80 ? 0.1 : 3);
                
                if (pct > 99) pct = 99;
                bar.style.width = pct + '%';

                setTimeout(update, Math.random() * 800 + 200);
            } else {
                // Révélation après 2s à 99%
                setTimeout(() => {
                    appleScreen.classList.add('hidden');
                    finalScreen.classList.remove('hidden');
                }, 2000);
            }
        }

        update();
    </script>
</body>
</html>
