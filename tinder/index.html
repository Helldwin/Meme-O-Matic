<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="https://cdn.tailwindcss.com"></script>
	<title>Tinder | Nouveau Match !</title>
	<style>
		@keyframes heartBeat {

			0%,
			70%,
			100% {
				transform: scale(1);
			}

			14%,
			42% {
				transform: scale(1.3);
			}
		}

		.animate-heart {
			animation: heartBeat 1.5s infinite;
		}

		.gradient-tinder {
			background: linear-gradient(45deg, #fd267a, #ff6036);
		}

		.card-shadow {
			box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
		}
	</style>
</head>

<body class="bg-slate-100 h-screen flex flex-col items-center justify-center font-sans overflow-hidden">

	<div id="matchOverlay"
		class="fixed inset-0 z-50 gradient-tinder flex flex-col items-center justify-center text-white p-6 transition-all duration-700 opacity-0 pointer-events-none scale-110">
		<h1 class="text-6xl font-black italic mb-10 tracking-tighter uppercase italic drop-shadow-lg">It's a Match!</h1>

		<div class="flex -space-x-4 mb-10">
			<div class="w-36 h-36 rounded-full border-4 border-white overflow-hidden shadow-2xl z-10 rotate-[-5deg]">
				<img src="https://ui-avatars.com/api/?name=Moi&background=0D9488&color=fff&size=256"
					class="w-full h-full object-cover">
			</div>
			<div
				class="w-36 h-36 rounded-full border-4 border-white overflow-hidden shadow-2xl z-20 rotate-[5deg] animate-pulse">
				<img id="matchPhoto" src="" class="w-full h-full object-cover">
			</div>
		</div>

		<p class="text-2xl font-bold mb-8 text-center max-w-xs" id="matchText"></p>

		<div class="flex flex-col w-full max-w-xs space-y-3">
			<button onclick="window.location.reload()"
				class="bg-white text-[#fd267a] py-4 rounded-full font-bold text-lg shadow-xl hover:scale-105 transition">Envoyer
				un message</button>
			<button onclick="window.location.href='../'"
				class="bg-transparent border-2 border-white py-4 rounded-full font-bold hover:bg-white/10 transition">Continuer
				à swiper</button>
		</div>
	</div>

	<div class="w-full max-w-[400px] px-4">
		<div
			class="relative aspect-[3/4] bg-white rounded-[2rem] card-shadow overflow-hidden border-[6px] border-white">
			<img id="cardPhoto" src="" class="w-full h-full object-cover grayscale-[0.2]">

			<div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>

			<div class="absolute bottom-0 p-8 w-full text-white">
				<div class="flex items-baseline gap-2">
					<h2 class="text-4xl font-extrabold tracking-tight" id="cardName"></h2>
					<span class="text-3xl font-light" id="cardAge"></span>
				</div>

				<div class="flex items-center gap-1 mt-1 text-teal-400 font-semibold">
					<span class="relative flex h-3 w-3">
						<span
							class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
						<span class="relative inline-flex rounded-full h-3 w-3 bg-teal-500"></span>
					</span>
					<p class="text-sm ml-1" id="cardDistance">À moins d'un kilomètre</p>
				</div>

				<div class="mt-4 p-3 bg-white/10 backdrop-blur-md rounded-xl border border-white/20">
					<p class="text-sm leading-relaxed" id="cardBio"></p>
				</div>
			</div>
		</div>

		<div class="flex justify-evenly items-center mt-8">
			<button onclick="triggerMatch()"
				class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-orange-500 shadow-lg hover:scale-110 transition active:scale-95">↺</button>
			<button onclick="triggerMatch()"
				class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-red-500 shadow-xl hover:scale-110 transition active:scale-95 text-3xl font-bold">✖</button>
			<button onclick="triggerMatch()"
				class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-green-500 shadow-xl hover:scale-110 transition active:scale-95 text-4xl animate-heart">💚</button>
			<button onclick="triggerMatch()"
				class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-purple-500 shadow-lg hover:scale-110 transition active:scale-95">⚡</button>
		</div>
	</div>

	<script>
		const victimes = [
			{ n: "H. Chaud K.", age: 22, bio: "Première rencontre et tu vas kiffer mon sabre laser.", img: "1.png" },
			{ n: "Five Night On Mati", age: 24, bio: "Si tu me lâche du regard, je te croc.", img: "2.png" },
			{ n: "Chaud Laping", age: 23, bio: "Si j'ai une hâche sous la main, laisse moi défoncer ta porte.", img: "3.png" },
			{ n: ".........", age: 26, bio: "Si je ne réponds pas, c'est que je suis sûrement mute.", img: "4.png" },
			{ n: "PoletoMan", age: 21, bio: "Je suis monotache mais je n'oublie jamais le polet le premier soir.", img: "5.png" },
			{ n: "Pepper La Terrible", age: 6, bio: "Je mord, je griffe, bref une vraie chatte.", img: "6.png" },
			{ n: "L'homme Mystère", age: 23, bio: "Je suis le gars sur la photo", img: "7.png" }
		];

		// Init
		const v = victimes[Math.floor(Math.random() * victimes.length)];
		const path = `../assets/victimes/${v.img}`;

		// Attribution dynamique
		document.getElementById('cardPhoto').src = path;
		document.getElementById('matchPhoto').src = path;
		document.getElementById('cardName').innerText = v.n;
		document.getElementById('cardAge').innerText = v.age;
		document.getElementById('cardBio').innerText = `"${v.bio}"`;
		document.getElementById('matchText').innerText = `Incroyable ! ${v.n} a aussi flashé sur toi.`;

		function triggerMatch() {
			const overlay = document.getElementById('matchOverlay');
			overlay.classList.replace('opacity-0', 'opacity-100');
			overlay.classList.replace('pointer-events-none', 'pointer-events-auto');
			overlay.classList.remove('scale-110');
		}
	</script>
</body>

</html>
